name: Nightly Extension Test

on:
  schedule:
    # Trigger at 02:00 CST (18:00 UTC) every day.
    # Chosen to avoid overlapping with nightly-pypi-package-test.yml (14:00 UTC).
    - cron: '0 18 * * *'
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/nightly-extension-test.yml'

concurrency:
  group: ${{ github.repository }}-${{ github.event.number || github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  nightly-extension-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-14
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          - os: ubuntu-latest
            platform-name: "linux-x86_64"
            arch: "x86_64"
          - os: ubuntu-24.04-arm
            platform-name: "linux-arm64"
            arch: "arm64"
          - os: macos-14
            platform-name: "macos-arm64"
            arch: "arm64"

    steps:
    - name: checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
        cache: 'pip'

    - name: Install NeuG and test dependencies
      run: |
        pip install neug pytest

    - name: Install Python test dependencies
      run: |
        cd ${GITHUB_WORKSPACE}/tools/python_bind/
        pip install -r requirements.txt
        pip install pytest
        pip install pyarrow==24.0.0

    - name: Run Extension Python Tests
      env:
        FLEX_DATA_DIR: ${GITHUB_WORKSPACE}/example_dataset/tinysnb
        MODERN_GRAPH_DATA_DIR: ${GITHUB_WORKSPACE}/example_dataset/modern_graph
        COMPREHENSIVE_GRAPH_DATA_DIR: ${GITHUB_WORKSPACE}/example_dataset/comprehensive_graph
      run: |
        cd ${GITHUB_WORKSPACE}/tools/python_bind/
        NEUG_RUN_EXTENSION_TESTS=true python3 -m pytest -sv tests/test_load.py -k "parquet or httpfs"
        NEUG_RUN_EXTENSION_TESTS=true python3 -m pytest -sv tests/test_export.py -k "parquet or httpfs"
        NEUG_RUN_EXTENSION_TESTS=true python3 -m pytest -sv tests/test_db_import_export.py -k "copy_from_parquet"
        NEUG_RUN_EXTENSION_TESTS=true python3 -m pytest -sv tests/test_sniffer.py -k "parquet"
        NEUG_RUN_EXTENSION_TESTS=true python3 -m pytest -sv tests/test_copy_temp.py -k "parquet or httpfs"
        NEUG_RUN_EXTENSION_TESTS=true python3 -m pytest -sv tests/test_gds_temp_graph.py
        python3 -m pytest -sv tests/test_gds.py
        python3 -m pytest -sv tests/test_gds_path.py
        python3 -m pytest -sv tests/test_gds_concurrency.py
        python3 -m pytest -sv tests/test_gds_yield.py
        python3 -m pytest -sv tests/test_graphalytics.py
