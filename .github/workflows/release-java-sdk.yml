name: Release Java SDK

on:
  release:
    types:
      - created
  workflow_dispatch:

concurrency:
  group: ${{ github.repository }}-${{ github.event.number || github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  release-java-sdk:
    name: Build and Publish Java SDK
    runs-on: ubuntu-22.04
    # TEMP: relaxed for release-flow verification on fork
    # if: github.repository == 'alibaba/neug'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          # TEMP: Maven Central credentials and GPG signing disabled for verification
          # server-id: central
          # server-username: MAVEN_CENTRAL_USERNAME
          # server-password: MAVEN_CENTRAL_PASSWORD
          # gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          # gpg-passphrase: GPG_PASSPHRASE

      - name: Build and Test Java SDK
        working-directory: tools/java_driver
        run: mvn -B test

      - name: Remove SNAPSHOT from version
        working-directory: tools/java_driver
        run: mvn -B versions:set -DremoveSnapshot -DgenerateBackupPoms=false

      - name: Print version after SNAPSHOT removal
        working-directory: tools/java_driver
        run: mvn -B help:evaluate -Dexpression=project.version -q -DforceStdout

      - name: Package and install (skip deploy & GPG)
        working-directory: tools/java_driver
        run: mvn -B install -DskipTests -Dgpg.skip=true

      - name: Verify build artifacts
        working-directory: tools/java_driver
        run: |
          echo "=== Build artifacts ==="
          find target -name '*.jar' -exec ls -lh {} \;
          echo "=== POM version ==="
          mvn -B help:evaluate -Dexpression=project.version -q -DforceStdout

      - name: Dry-run deploy (no actual publish)
        working-directory: tools/java_driver
        run: |
          echo "=== Deploy dry-run (skipping actual publish to Maven Central) ==="
          mvn -B deploy -DskipTests -Dgpg.skip=true \
            -DaltDeploymentRepository=local::default::file://${PWD}/target/local-repo
          echo "=== Dry-run complete, artifacts in target/local-repo ==="
          find target/local-repo -type f -exec ls -lh {} \;
