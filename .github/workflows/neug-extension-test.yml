name: NeuG Extension Test

on:
  schedule:
    # Run at 04:00 CST (20:00 UTC Friday) every Saturday
    - cron: '0 20 * * 5'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/neug-extension-test.yml'
  workflow_dispatch:  # Manual trigger (must exist on default branch to see "Run workflow")
    inputs:
      branch:
        description: 'Branch to run the workflow on'
        required: true
        default: 'main'
        type: string

concurrency:
  group: ${{ github.repository }}-${{ github.event.number || github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  extension_tests_wheel_linux_x86_64:
    runs-on: [self-hosted, daily, linux, x64]
    steps:
      - name: checkout
        id: checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install cibuildwheel
        run: python3 -m pip install cibuildwheel==3.4.0

      - name: Prepare for linux
        run: |
          echo "CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)" >> $GITHUB_ENV

      - name: Limit builds to CPython 3.13 on PRs
        run: |
          echo "CIBW_SKIP=cp39-* cp38-* cp311-* cp312-* cp310-*" >> $GITHUB_ENV
          echo "CIBW_BUILD=cp313-manylinux_x86_64" >> $GITHUB_ENV

      - name: Build NeuG wheel
        run: |
          export CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)
          export BUILD_TYPE=RELEASE
          export PYBIND11_FINDPYTHON=OFF
          python3 -m cibuildwheel ./tools/python_bind --output-dir wheelhouse

      - name: Build Extension Package
        run: |
          export CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)
          export BUILD_TYPE=RELEASE
          export PYBIND11_FINDPYTHON=OFF
          CI_INSTALL_EXTENSIONS="parquet;httpfs" python3 -m cibuildwheel ./tools/python_bind --output-dir extension_packages

      - name: Clean all installed python packages
        run: |
          python3 -m pip freeze | xargs python3 -m pip uninstall -y || true

      - name: Install Wheel and extension
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip uninstall -y neug || echo "Uninstalled neug if it was installed"
          # install NeuG wheel
          for i in wheelhouse/*.whl; do
            [ -f "$i" ] && python3 -m pip install "$i" || echo "Failed to install $i"
          done
          # install Extension Package (extract first .whl when multiple exist)
          EXT_WHL=$(echo extension_packages/*.whl | awk '{print $1}')
          python3 -m zipfile -e "$EXT_WHL" extension_packages
          # copy extension to the same site-packages where neug is installed
          NEUG_SITE=$(python3 -c "import neug, os; print(os.path.dirname(os.path.dirname(neug.__file__)))")
          mkdir -p $NEUG_SITE/extension
          rm -rf $NEUG_SITE/extension
          cp -r extension_packages/extension $NEUG_SITE/
          # Copy auditwheel-bundled shared libraries (e.g. libcurl, libarrow_s3)
          # from the extension wheel.  auditwheel renames .so files with a
          # content hash (e.g. libcurl-34c6b10f.so.4.3.0) and places them in
          # <package>.libs/.  Without this step the extension .so files fail to
          # load at runtime because the hash-renamed libraries are missing.
          if [ -d extension_packages/neug.libs ]; then
            mkdir -p $NEUG_SITE/neug.libs
            cp -rf extension_packages/neug.libs/* $NEUG_SITE/neug.libs/
          fi

      - name: Run simple and complex tests
        env:
          TMP_DIR: ${{ github.workspace }}/${{ github.run_id }}
        run: |
          rm -rf ${TMP_DIR}/test_example
          GLOG_v=10 python3 tools/python_bind/example/simple_example.py example_dataset/modern_graph ${TMP_DIR}/test_example
          NEUG_RUN_EXTENSION_TESTS=1 python3 tools/python_bind/example/complex_test.py

  extension_tests_wheel_linux_arm64:
    runs-on: [self-hosted, daily, linux, arm64]
    steps:
      - name: checkout
        id: checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python 3.13
        if: runner.name != 'arm64-1'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
  
      - name: Install cibuildwheel
        run: python3 -m pip install cibuildwheel==3.4.0

      - name: Prepare for linux
        run: |
          echo "CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)" >> $GITHUB_ENV

      - name: Limit builds to CPython 3.13 on PRs
        run: |
          echo "CIBW_SKIP=cp39-* cp38-* cp311-* cp312-* cp310-*" >> $GITHUB_ENV
          echo "CIBW_BUILD=cp313-manylinux_aarch64" >> $GITHUB_ENV

      - name: Build NeuG wheel
        run: |
          export CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)
          export BUILD_TYPE=RELEASE
          export PYBIND11_FINDPYTHON=OFF
          python3 -m cibuildwheel ./tools/python_bind --output-dir wheelhouse
      
      - name: Build Extension Package
        run: |
          export CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)
          export BUILD_TYPE=RELEASE
          export PYBIND11_FINDPYTHON=OFF
          CI_INSTALL_EXTENSIONS="parquet;httpfs" python3 -m cibuildwheel ./tools/python_bind --output-dir extension_packages

      - name: Clean all installed python packages
        run: |
          python3 -m pip freeze | xargs python3 -m pip uninstall -y || true

      - name: Install Wheel and extension
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip uninstall -y neug || echo "Uninstalled neug if it was installed"
          # install NeuG wheel
          for i in wheelhouse/*.whl; do
            [ -f "$i" ] && python3 -m pip install "$i" || echo "Failed to install $i"
          done
          # install Extension Package (extract first .whl when multiple exist)
          EXT_WHL=$(echo extension_packages/*.whl | awk '{print $1}')
          python3 -m zipfile -e "$EXT_WHL" extension_packages
          # copy extension to the same site-packages where neug is installed
          NEUG_SITE=$(python3 -c "import neug, os; print(os.path.dirname(os.path.dirname(neug.__file__)))")
          mkdir -p $NEUG_SITE/extension
          rm -rf $NEUG_SITE/extension
          cp -r extension_packages/extension $NEUG_SITE/
          if [ -d extension_packages/neug.libs ]; then
            mkdir -p $NEUG_SITE/neug.libs
            cp -rf extension_packages/neug.libs/* $NEUG_SITE/neug.libs/
          fi

      - name: Run simple and complex tests
        env:
          TMP_DIR: ${{ github.workspace }}/${{ github.run_id }}
        run: |
          rm -rf ${TMP_DIR}/test_example
          GLOG_v=10 python3 tools/python_bind/example/simple_example.py example_dataset/modern_graph ${TMP_DIR}/test_example
          NEUG_RUN_EXTENSION_TESTS=1 python3 tools/python_bind/example/complex_test.py

  # ============================================================
  # Notify: Send results to DingTalk
  # ============================================================
  notify-extension-result:
    needs: [extension_tests_wheel_linux_x86_64, extension_tests_wheel_linux_arm64]
    if: always() && github.repository == 'alibaba/neug'
    runs-on: ubuntu-latest
    steps:
      - name: Send DingTalk notification
        env:
          DINGTALK_TOKEN: ${{ secrets.DINGTALK_TOKEN }}
        run: |
          if [ -z "$DINGTALK_TOKEN" ]; then
            echo "DINGTALK_TOKEN not set, skipping notification."
            exit 0
          fi
          WEBHOOK_URL="https://oapi.dingtalk.com/robot/send?access_token=${DINGTALK_TOKEN}"
          STATUS_X86="${{ needs.extension_tests_wheel_linux_x86_64.result }}"
          STATUS_ARM="${{ needs.extension_tests_wheel_linux_arm64.result }}"
          if [[ "$STATUS_X86" == "success" && "$STATUS_ARM" == "success" ]]; then
            TITLE="[Nightly Report] NeuG Extension Test Passed"
          else
            TITLE="[Nightly Report] NeuG Extension Test Failed"
          fi
          curl -s -X POST "$WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"title\": \"$TITLE\",
                \"text\": \"## $TITLE\n\n- **wheel_linux_x86_64**: ${STATUS_X86}\n- **wheel_linux_arm64**: ${STATUS_ARM}\n- **Repo**: ${{ github.repository }}\n- **Branch**: ${{ github.ref_name }}\n- **Commit**: ${{ github.sha }}\n- [View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"
              }
            }"
